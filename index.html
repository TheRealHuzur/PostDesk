<!DOCTYPE html>
<html lang="de" data-theme="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PostDesk</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <style>
    /* ═══════════════════════════════════════════
     TOKENS — Dark Theme (default)
  ═══════════════════════════════════════════ */
    :root {
      --teal: #0e97ad;
      --sky: #0ea5e9;
      --light: #b0cfe5;
      --navy: #2a314d;
      --deep: #0B162A;

      /* semantic (Dark Theme) */
      --bg: #020617;
      --bg-2: #1a2235;
      --bg-3: #1e2c42;
      --text: #e8eef5;
      --text-muted: #7a91ab;
      --border: rgba(176, 207, 229, 0.12);
      --glow: rgba(14, 151, 173, 0.18);
      --accent: var(--teal);
      --accent-2: var(--sky);
      --input-bg: #1e2c42;
      --shadow: 0 4px 24px rgba(0, 0, 0, 0.35);
      --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.25);
      --grid-color: rgba(14, 151, 173, 0.035);
    }

    /* ═══════════════════════════════════════════
     TOKENS — Light Theme
  ═══════════════════════════════════════════ */
    [data-theme="light"] {
      --bg: #eef4fa;
      --bg-2: #ffffff;
      --bg-3: #e2ecf5;
      --text: #0f1c2e;
      --text-muted: #4e6680;
      --border: rgba(14, 97, 150, 0.13);
      --border-highlight: rgba(255, 255, 255, 0.85);
      --glow: rgba(14, 151, 173, 0.13);
      --accent: #0a7d94;
      --accent-2: #0284c7;
      --input-bg: #f5f9fd;
      --shadow: 0 4px 24px rgba(14, 60, 120, 0.10);
      --shadow-sm: 0 2px 10px rgba(14, 60, 120, 0.08);
      --grid-color: rgba(14, 97, 173, 0.045);
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      line-height: 1.6;
      min-height: 100vh;
      transition: background 0.35s ease, color 0.35s ease;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--grid-color) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
      transition: opacity 0.35s;
    }

    .page {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ── Light Mode overrides ── */
    [data-theme="light"] header {
      background: linear-gradient(to bottom, rgba(238, 244, 250, 0.97), rgba(238, 244, 250, 0.82));
      border-bottom: 1px solid rgba(14, 151, 173, 0.18);
    }

    [data-theme="light"] .card {
      box-shadow: 0 2px 12px rgba(14, 60, 120, 0.08), inset 0 1px 0 rgba(255, 255, 255, 0.8);
      border-color: rgba(14, 97, 150, 0.13);
    }

    [data-theme="light"] .card-clickable:hover {
      border-color: rgba(14, 151, 173, 0.45);
      box-shadow: 0 4px 20px rgba(14, 97, 150, 0.14), 0 0 0 1px rgba(14, 151, 173, 0.12), inset 0 1px 0 rgba(255, 255, 255, 0.9);
      transform: translateY(-2px);
    }

    [data-theme="light"] input[type=text],
    [data-theme="light"] textarea,
    [data-theme="light"] select {
      background: #f5f9fd;
      border-color: rgba(14, 97, 150, 0.18);
    }

    [data-theme="light"] .output-area {
      background: #f0f6fc;
      border-color: rgba(14, 97, 150, 0.15);
    }

    [data-theme="light"] .stat span {
      color: var(--accent);
    }

    [data-theme="light"] .hero h1 span {
      background: linear-gradient(135deg, #0a7d94, #0284c7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    [data-theme="light"] .btn-primary {
      background: var(--accent-2);
    }

    /* ── transitions for theme switch ── */
    .card,
    header,
    input,
    textarea,
    select,
    .dropzone,
    .output-area,
    .table-wrap,
    .tabs,
    .tab,
    .alert,
    label,
    .stat,
    .badge,
    .status-badge,
    footer {
      transition: background 0.3s ease, border-color 0.3s ease,
        color 0.3s ease, box-shadow 0.3s ease;
    }

    /* ══════════════════════════════════
     HEADER
  ══════════════════════════════════ */
    header {
      background: color-mix(in srgb, var(--bg) 80%, transparent);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-inner {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
    }

    .logo {
      font-family: 'Inter', sans-serif;
      font-size: 20px;
      font-weight: 800;
      letter-spacing: normal;
      color: var(--text);
      display: flex;
      align-items: center;
    }

    /* ── Theme Toggle ── */
    .theme-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      user-select: none;
    }

    .theme-label {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 500;
      min-width: 32px;
      transition: color 0.3s;
    }

    .toggle-track {
      width: 44px;
      height: 24px;
      background: var(--bg-3);
      border: 1px solid var(--border);
      border-radius: 12px;
      position: relative;
      cursor: pointer;
      transition: background 0.3s, border-color 0.3s;
    }

    .toggle-track.active {
      background: linear-gradient(135deg, var(--teal), var(--sky));
      border-color: var(--teal);
    }

    .toggle-thumb {
      width: 18px;
      height: 18px;
      background: #fff;
      border-radius: 50%;
      position: absolute;
      top: 2px;
      left: 2px;
      transition: transform 0.3s cubic-bezier(.34, 1.56, .64, 1), background 0.3s;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      line-height: 1;
    }

    .toggle-track.active .toggle-thumb {
      transform: translateX(20px);
    }

    .badge {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      padding: 3px 10px;
      border-radius: 20px;
      background: rgba(14, 151, 173, 0.15);
      border: 1px solid rgba(14, 151, 173, 0.3);
      color: var(--teal);
      text-transform: uppercase;
    }

    /* ══════════════════════════════════
     MAIN LAYOUT
  ══════════════════════════════════ */
    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 48px 24px 80px;
      width: 100%;
      flex: 1;
    }

    /* ── Hero ── */
    .hero {
      margin-bottom: 52px;
      text-align: center;
    }

    .hero-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--teal);
      margin-bottom: 16px;
    }

    .hero h1 {
      font-family: 'Inter', sans-serif;
      font-size: clamp(28px, 5vw, 44px);
      font-weight: 800;
      line-height: 1.1;
      color: var(--text);
      letter-spacing: -0.02em;
      margin-bottom: 16px;
    }

    .hero h1 span {
      background: linear-gradient(135deg, var(--teal), var(--sky));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero p {
      color: var(--text-muted);
      max-width: 480px;
      margin: 0 auto;
    }

    /* ── Card ── */
    .card {
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 28px;
      margin-bottom: 16px;
      box-shadow: var(--shadow-sm);
      animation: fadeUp 0.4s ease both;
      display: flex;
      flex-direction: column;
    }

    [data-theme="dark"] .card {
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
    }

    .card.card-clickable:hover {
      border-color: rgba(14, 151, 173, 0.28);
      box-shadow: 0 0 30px var(--glow), var(--shadow-sm);
    }

    [data-theme="dark"] .card.card-clickable:hover {
      box-shadow: 0 0 30px var(--glow), 0 4px 24px rgba(0, 0, 0, 0.4);
    }

    .card:nth-child(2) {
      animation-delay: 0.08s;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(16px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .card-icon {
      width: 40px;
      height: 40px;
      min-width: 40px;
      min-height: 40px;
      border-radius: 10px;
      background: linear-gradient(135deg, rgba(14, 151, 173, 0.15), rgba(14, 165, 233, 0.08));
      border: 1px solid rgba(14, 151, 173, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      margin-bottom: 12px;
    }

    [data-theme="dark"] .card-icon {
      background: linear-gradient(135deg, rgba(14, 151, 173, 0.2), rgba(14, 165, 233, 0.1));
      border: 1px solid rgba(14, 151, 173, 0.25);
    }

    .card h2 {
      font-family: 'Inter', sans-serif;
      font-size: 17px;
      font-weight: 700;
      letter-spacing: -0.01em;
      color: var(--text);
      margin-bottom: 6px;
    }

    .card p {
      color: var(--text-muted);
      font-size: 13.5px;
    }

    /* ── Buttons ── */
    .btn-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 20px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      padding: 9px 20px;
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 13.5px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
      text-decoration: none;
    }

    .btn-secondary {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 5px 12px;
      border-radius: 8px;
      font-size: 13.5px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-secondary:hover {
      border-color: var(--teal);
      color: var(--teal);
      background: rgba(14, 151, 173, 0.06);
    }

    .btn-secondary.success {
      border-color: var(--teal);
      color: var(--teal);
      background: rgba(14, 151, 173, 0.1);
    }

    .btn-secondary.error {
      border-color: #ef4444;
      color: #ef4444;
      background: rgba(239, 68, 68, 0.1);
    }

    /* ── Form elements ── */
    .form-group {
      margin-bottom: 16px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    textarea {
      width: 100%;
      flex: 1;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.3s;
      resize: vertical;
      min-height: 240px;
    }

    textarea:focus {
      border-color: var(--teal);
      box-shadow: 0 0 0 3px rgba(14, 151, 173, 0.12);
    }

    /* ── Output area ── */
    .output-area {
      background: var(--bg-3);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-family: 'Inter', sans-serif;
      /* Using Inter since it's meant to simulate a post, not code */
      font-size: 15px;
      color: var(--text);
      padding: 20px;
      min-height: 240px;
      line-height: 1.6;
      transition: background 0.3s, border-color 0.3s;
      white-space: pre-wrap;
      flex: 1;
      overflow-y: auto;
    }

    .output-toolbar {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-bottom: 10px;
      align-items: center;
    }

    /* ── Grid ── */
    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      align-items: stretch;
    }

    @media (max-width: 768px) {
      .grid-2 {
        grid-template-columns: 1fr;
      }
    }

    /* ── Footer ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 20px 24px;
      text-align: center;
      font-size: 12px;
      color: var(--text-muted);
      width: 100%;
    }
  </style>
</head>

<body>
  <div class="page">

    <!-- HEADER -->
    <header>
      <div class="header-inner">
        <div class="logo">Post<span style="color:var(--sky)">DESK</span></div>
        <div style="display:flex; align-items:center; gap:16px;">
          <!-- Theme Toggle -->
          <div class="theme-toggle" onclick="toggleTheme()" title="Theme wechseln">
            <span class="theme-label" id="themeLabel">Hell</span>
            <div class="toggle-track" id="toggleTrack">
              <div class="toggle-thumb" id="toggleThumb">☀️</div>
            </div>
          </div>
        </div>
      </div>
    </header>

    <main>

      <!-- HERO -->
      <div class="hero">
        <div class="logo" style="justify-content: center; margin-bottom: 8px;">
          Post<span style="color:var(--sky)">DESK</span>
        </div>
        <div class="hero-label">LinkedIn Formatierungs-Tool</div>
        <h1>Markdown einfügen<br>und <span>LinkedIn-Darstellung kopieren</span></h1>
      </div>

      <div class="grid-2">
        <!-- INPUT CARD -->
        <div class="card">
          <div class="card-icon">✍️</div>
          <h2>Eingabe</h2>
          <div class="output-toolbar" style="margin-top: 12px; margin-bottom: 8px; justify-content: space-between;">
            <label for="markdownInput" style="margin-bottom: 0;">Roher Text (Markdown)</label>
            <button id="clearButton" class="btn btn-secondary"
              style="padding:5px 12px; font-size:12px;">Löschen</button>
          </div>
          <div class="form-group" style="margin-top:0;">
            <textarea id="markdownInput"
              placeholder="Deinen Markdown-Text hier einfügen...&#10;&#10;Zum Beispiel mit **fettem** Text und *kursiven* Highlights."></textarea>
          </div>
        </div>

        <!-- OUTPUT CARD -->
        <div class="card">
          <div class="card-icon">📤</div>
          <h2>Output</h2>
          <div class="output-toolbar" style="margin-top: 12px; margin-bottom: 8px;">
            <span id="copyStatus"
              style="font-size: 12px; font-weight: 500; margin-right: 8px; transition: color 0.3s; opacity: 0;"></span>
            <button id="copyButton" class="btn btn-secondary"
              style="padding:5px 12px; font-size:12px;">Kopieren</button>
          </div>
          <div id="linkedinOutput" class="output-area"></div>
        </div>
      </div>

    </main>

    <footer>
      <div style="margin-bottom: 8px;">
        <a href="https://www.wissen-und-werkzeug.de"
          style="color:var(--teal); text-decoration:none;">wissen-und-werkzeug.de</a> · Werkzeuge für den Arbeitsalltag
      </div>
      <div>
        <a href="https://wissen-und-werkzeug.de/impressum/"
          style="color:var(--text-muted); text-decoration:none;">Impressum</a> ·
        <a href="https://datenschutz.wissen-und-werkzeug.de/"
          style="color:var(--text-muted); text-decoration:none;">Datenschutz</a>
      </div>
    </footer>

  </div>

  <script>
    // --- Theme Toggle ---
    let isDark = true;

    function toggleTheme() {
      isDark = !isDark;
      const html = document.documentElement;
      const track = document.getElementById('toggleTrack');
      const thumb = document.getElementById('toggleThumb');
      const label = document.getElementById('themeLabel');

      if (isDark) {
        html.setAttribute('data-theme', 'dark');
        track.classList.add('active');
        thumb.textContent = '🌙';
        label.textContent = 'Hell';
      } else {
        html.setAttribute('data-theme', 'light');
        track.classList.remove('active');
        thumb.textContent = '☀️';
        label.textContent = 'Dunkel';
      }
    }

    // init state
    document.getElementById('toggleTrack').classList.add('active');
    document.getElementById('toggleThumb').textContent = '🌙';

    // --- Formatter Logic ---
    const markdownInput = document.getElementById("markdownInput");
    const linkedinOutput = document.getElementById("linkedinOutput");
    const copyButton = document.getElementById("copyButton");
    const copyStatus = document.getElementById("copyStatus");
    const clearButton = document.getElementById("clearButton");

    const boldMap = createUnicodeMap({
      upper: 0x1d5d4,
      lower: 0x1d5ee,
      digits: 0x1d7ec,
    });
    const italicMap = createUnicodeMap({
      upper: 0x1d608,
      lower: 0x1d622,
    });
    const boldItalicMap = createUnicodeMap({
      upper: 0x1d63c,
      lower: 0x1d656,
      digits: 0x1d7ec,
    });

    const sample = `## Beispiel\n\n**Fett** und *kursiv* funktionieren auf LinkedIn durch Unicode-Zeichen.\n\n- Listen bleiben als Text erhalten.\n- Emojis bleiben erhalten 🚀`;
    markdownInput.value = sample;
    updatePreview();

    markdownInput.addEventListener("input", updatePreview);
    copyButton.addEventListener("click", handleCopy);
    clearButton.addEventListener("click", () => {
      markdownInput.value = "";
      updatePreview();
    });

    function updatePreview() {
      const formatted = convertMarkdownToLinkedIn(markdownInput.value);
      linkedinOutput.textContent = formatted;
      resetCopyStatus();
    }

    function handleCopy() {
      const formatted = convertMarkdownToLinkedIn(markdownInput.value);

      const successCb = () => {
        copyStatus.textContent = "Kopiert!";
        copyStatus.style.color = "var(--teal)";
        copyStatus.style.opacity = "1";
        copyButton.classList.add("success");
        copyButton.classList.remove("error");
        setTimeout(resetCopyStatus, 2500);
      };

      const errorCb = () => {
        copyStatus.textContent = "Fehler!";
        copyStatus.style.color = "#ef4444";
        copyStatus.style.opacity = "1";
        copyButton.classList.add("error");
        copyButton.classList.remove("success");
        setTimeout(resetCopyStatus, 2500);
      };

      if (navigator.clipboard && window.isSecureContext) {
        navigator.clipboard.writeText(formatted).then(successCb).catch(errorCb);
      } else {
        // Fallback for older browsers or non-secure contexts
        try {
          const textArea = document.createElement("textarea");
          textArea.value = formatted;
          textArea.style.position = "fixed";
          textArea.style.left = "-999999px";
          textArea.style.top = "-999999px";
          document.body.appendChild(textArea);
          textArea.focus();
          textArea.select();
          document.execCommand("copy");
          textArea.remove();
          successCb();
        } catch (error) {
          console.error("Fallback copy failed", error);
          errorCb();
        }
      }
    }

    function resetCopyStatus() {
      copyStatus.style.opacity = "0";
      copyButton.classList.remove("success", "error");
    }

    function convertMarkdownToLinkedIn(text) {
      const lines = text.replace(/\r\n?/g, "\n").split("\n");
      const converted = lines.map((line) => {
        let workingLine = line.replace(/^#{1,6}\s*/, "");

        // Handle blockquotes
        workingLine = workingLine.replace(/^>\s*/, "▎ ");

        workingLine = workingLine.replace(/\*\*\*(.+?)\*\*\*/g, (_, content) => applyMap(content, boldItalicMap));
        workingLine = workingLine.replace(/___(.+?)___/g, (_, content) => applyMap(content, boldItalicMap));
        workingLine = workingLine.replace(/\*\*(.+?)\*\*/g, (_, content) => applyMap(content, boldMap));
        workingLine = workingLine.replace(/__(.+?)__/g, (_, content) => applyMap(content, boldMap));
        workingLine = workingLine.replace(/\*(.+?)\*/g, (_, content) => applyMap(content, italicMap));
        workingLine = workingLine.replace(/_(.+?)_/g, (_, content) => applyMap(content, italicMap));
        return workingLine;
      });

      return converted.join("\n");
    }

    function createUnicodeMap({ upper, lower, digits }) {
      const map = new Map();

      for (let index = 0; index < 26; index += 1) {
        map.set(String.fromCharCode(65 + index), String.fromCodePoint(upper + index));
        map.set(String.fromCharCode(97 + index), String.fromCodePoint(lower + index));
      }

      if (digits !== undefined) {
        for (let index = 0; index < 10; index += 1) {
          map.set(String.fromCharCode(48 + index), String.fromCodePoint(digits + index));
        }
      }

      return map;
    }

    function applyMap(content, map) {
      return Array.from(content)
        .map((char) => map.get(char) ?? char)
        .join("");
    }
  </script>
</body>

</html>
